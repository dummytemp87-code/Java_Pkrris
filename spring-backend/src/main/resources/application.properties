server.port=8080
# Optionally set here or use environment variable OPENAI_API_KEY
# openai.apiKey=
openai.model=gpt-4o-mini

# Groq (OpenAI-compatible, dormant/fallback). Key is supplied via GROQ_API_KEY env var, not stored here.
groq.model=llama-3.3-70b-versatile
groq.baseUrl=https://api.groq.com/openai/v1

# Gemini (active AI provider). Key is supplied via GEMINI_API_KEY env var, not stored here.
gemini.model=gemini-3.1-flash-lite
gemini.baseUrl=https://generativelanguage.googleapis.com/v1

# Supabase Postgres datasource. Username/password are supplied via DB_USERNAME/DB_PASSWORD
# env vars, not stored here. No default is provided on purpose: the app should fail fast at
# startup rather than silently running against a stale or leaked credential.

spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection pool
spring.datasource.hikari.maximum-pool-size=10

# JWT. Secret is supplied via JWT_SECRET env var, not stored here (no default — fails fast
# at startup if missing; generate one with: openssl rand -base64 48
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# YouTube. Key is supplied via YOUTUBE_API_KEY env var, not stored here.
youtube.apiKey=${YOUTUBE_API_KEY:}

# CORS. Comma-separated list of allowed frontend origins, env-configurable per environment.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Actuator: expose only a bare health endpoint for deployment platform health checks.
# show-details=never avoids leaking DB/connection info the way ex.getMessage() used to.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Syllabus upload (goal creation). Default 1MB is too small for a real PDF/DOCX syllabus.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Razorpay (subscription billing). Keys are supplied via env vars, not stored here.
# Plan IDs come from Razorpay Dashboard -> Subscriptions -> Plans (created manually, not via API).
razorpay.keyId=${RAZORPAY_KEY_ID:}
razorpay.keySecret=${RAZORPAY_KEY_SECRET:}
razorpay.webhookSecret=${RAZORPAY_WEBHOOK_SECRET:}
razorpay.plan.starter=${RAZORPAY_PLAN_STARTER:}
razorpay.plan.pro=${RAZORPAY_PLAN_PRO:}